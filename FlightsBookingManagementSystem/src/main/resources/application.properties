spring.application.name=FlightsBookingManagementSystem



spring.datasource.url=jdbc:mysql://localhost:3306/flight_booking


spring.datasource.username=root

spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


spring.jpa.show-sql=true

spring.jpa.generate-ddl=true


spring.jpa.hibernate.ddl-auto= create-drop

spring.web.error.include-message=always

spring.web.error.include-stacktrace=always

app.whatsapp.instance=${ULTRAMSG_INSTANCE}
app.whatsapp.token=${ULTRAMSG_TOKEN}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true